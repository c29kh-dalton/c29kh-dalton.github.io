<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Document</title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.12/lib/p5.min.js"></script>
</head>
<body>
	<script>
		function setup(){
			createCanvas(800,800)
		}

		function draw(){
			background (200)
			//rotate(PI/8)
			//rotate(frameCount * 0.01)
			//rectMode(CENTER)
			push()
			translate(300,300)
			rectMode(CENTER)
			rotate(frameCount * 0.03)
			rect(0,0,100,50)
			pop()

			push()
			rectMode(CENTER)
			translate(width/2, height/2)
			rotate(frameCount*0.01)
			rect(0,0,200,50)
			pop()

			push()
			translate(100,100)
			rotate(frameCount * 0.02)
			circle(0-50,0-50,50) // left ear
			circle(0+50, 0-50,50)
			circle(0,0,100)
			pop()
		}
	</script>
</body>
</html>
