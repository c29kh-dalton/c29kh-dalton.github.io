<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Document</title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.12/
	lib/p5.min.js"></script>
</head>
<body>
<script>
	let xpos
	let ypos
	let d = 50
	let fillColor = "blue"
	function setup(){
		createCanvas (800,800)
		xpos = width/2
		ypos = height/2
		xspeed = 5
		yspeed = 8
	}
		
		
	// OR : ||
	// AND : &&
	function draw(){
		background(200)

		d = getRandomDiameter (10,100)

		// if xpos is larger width OR if xpos is less than 0
		if (xpos + d/2 > width || xpos - d/2 < 0) {
			// reverse
			xspeed *= -1
		}
		// if ypos is larger than height OR ypos is less than 0
		if (ypos + d/2 > height || ypos - d/2 < 0) {
			yspeed *= -1
		}

		// if xpos is larger than width/2 AND ypos is less than height/2
		changeBallColor("pink","purple", "yellow", "red")
		
		xpos += xspeed
		ypos += yspeed

		fill(fillColor)
		circle(xpos,ypos,d)
	}

	function getRandomDiameter (minSize,maxSize) {
			let randomDiameter = random (minSize, maxSize)
			
			return randomDiameter
	}

	function changeBallColor(topRightColor, bottomRightColor, topLeftColor, bottomLeftColor) {
		if (xpos > width/2 && ypos < height/2) { // top right
			fillColor = topRightColor
		} else if (xpos > width/2 && ypos > height/2) { // bottom right
				fillColor = bottomRightColor
			} else if (xpos < width/2 && ypos < height/2) { // top left
				} else if (xpos < width/2 && ypos < height/2){
					fillColor = topLeftColor
					} else { // bottom left
						fillColor = bottomLeftColor
					}
				}
	</script>	
</body>
</html>
