<!DOCTYPE html>as
	<style>
		.container {
			display: grid;
			grid-template-columns: repeat(4,1fr);

		}

		.item {
			border: 1px solid black;
		}

		.item img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}
	</style>
</head>
<body>
<div class="container">
	<div class="item" id="item1">
		<img src="nyc.png" alt="new york city">
	</div>
	<div class="item" id="item2">
		<img src="paris.png" alt="paris">
	</div>
	<div class="item" id="item3">
		<img src="hawaii.png" alt="hawaii">
	</div>
	<div class="item" id="item4"> 
		<img src="aspen.png" alt="aspen">
		 </div>
	<div class="item" id="item5">
		<img src="london.png" alt="london">
	</div>
</div>
</body>
</html>
