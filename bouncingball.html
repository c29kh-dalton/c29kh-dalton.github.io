<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Document</title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.12/
	lib/p5.min.js"></script>
</head>
<body>
<script>
	let xpos
	let ypos
	function setup(){
		createCanvas (800,800)
		xpos = width/2
		ypos = height/2
		xspeed = 5
		yspeed = 8
		d = 50
		circleColor = "white"
	}

	function draw(){
		background(200)
		
		// if xpos is larger width OR if xpos is less than 0
		if (xpos + d/2 > width || xpos - d/2 < 0) {
			xspeed *= -1//bounce back
		}
		
		if (ypos > height || ypos < 0) {
			yspeed *= -1
		}

		// if xpos is larger than width/2 AND ypos is less than height/2
		if (xpos>width/2 && ypos < height/2) {
			circleColor="black"
		} else {
			circleColor="white"
		}

		xpos += xspeed
		ypos += yspeed
		fill(circleColor)
		circle(xpos,ypos,d)
	}
</script>
	
</body>
</html>
